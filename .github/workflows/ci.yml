# Continuous Integration Workflow
# Runs on all pull requests and pushes to main branch
# Performs linting, type checking, and build verification

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # GitHub Actions Configuration
  RUNNER_OS: ubuntu-latest
  NODE_VERSION: '20'
  CHECKOUT_VERSION: v4
  SETUP_NODE_VERSION: v4
  UPLOAD_ARTIFACT_VERSION: v4
  
  # Build Configuration
  ARTIFACT_RETENTION_DAYS: 1
  BUILD_ARTIFACT_NAME: nextjs-build
  
  # Mock Database Configuration (for build verification)
  MOCK_DATABASE_TYPE: supabase
  MOCK_DATABASE_URL: postgresql://mock:mock@localhost:5432/mock

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ${{ env.RUNNER_OS }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@${{ env.CHECKOUT_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@${{ env.SETUP_NODE_VERSION }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  build:
    name: Build Application
    runs-on: ${{ env.RUNNER_OS }}
    needs: lint-and-typecheck
    
    env:
      # Mock environment variables for build verification
      DATABASE_TYPE: ${{ env.MOCK_DATABASE_TYPE }}
      DATABASE_URL: ${{ env.MOCK_DATABASE_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@${{ env.CHECKOUT_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@${{ env.SETUP_NODE_VERSION }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@${{ env.UPLOAD_ARTIFACT_VERSION }}
        if: success()
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: .next/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: ignore

