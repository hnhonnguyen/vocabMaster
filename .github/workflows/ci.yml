# Continuous Integration Workflow
# Runs on all pull requests and pushes to main branch
# Performs linting, type checking, and build verification

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Build Configuration
  ARTIFACT_RETENTION_DAYS: 1
  BUILD_ARTIFACT_NAME: nextjs-build
  
  # Mock Database Configuration (for build verification)
  MOCK_DATABASE_TYPE: supabase
  MOCK_DATABASE_URL: postgresql://mock:mock@localhost:5432/mock

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    env:
      # Mock environment variables for build verification
      DATABASE_TYPE: supabase
      DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: .next/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: ignore

