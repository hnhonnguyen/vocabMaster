# Continuous Deployment Workflow
# Consolidated workflow for Vercel deployments and Supabase migrations
# Runs on pushes to main, pull requests targeting main, and manual dispatch

name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run Supabase migrations'
        required: false
        default: true
        type: boolean
      deploy_vercel:
        description: 'Deploy to Vercel'
        required: false
        default: true
        type: boolean

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  # Vercel Environment Variables (configured automatically during deployment)
  DATABASE_TYPE: ${{ secrets.DATABASE_TYPE }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  # Determine what to deploy based on event type
  check-ci-status:
    name: Check CI Status
    runs-on: ubuntu-latest
    outputs:
      should_migrate: ${{ steps.check.outputs.should_migrate }}
      is_pr: ${{ steps.check.outputs.is_pr }}
      pr_number: ${{ steps.check.outputs.pr_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine deployment type
        id: check
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" == "pull_request" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi
          # Check if supabase files changed in the HEAD commit
          if git diff-tree --no-commit-id --name-only -r HEAD | grep -q "^supabase/"; then
            echo "should_migrate=true" >> $GITHUB_OUTPUT
          else
            echo "should_migrate=false" >> $GITHUB_OUTPUT
          fi

  # Run Supabase migrations first (only on main branch pushes, not PRs)
  supabase-migrate:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    needs: [check-ci-status]
    if: |
      needs.check-ci-status.outputs.is_pr == 'false' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.run_migrations) ||
        (github.event_name == 'push' && needs.check-ci-status.outputs.should_migrate == 'true')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Run database migrations
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Verify migration status
        run: supabase migration list

  # Deploy preview for pull requests
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [check-ci-status]
    if: |
      needs.check-ci-status.outputs.is_pr == 'true' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_vercel) ||
        github.event_name == 'pull_request'
      )

    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Configure Vercel Environment Variables
        run: |
          # Set DATABASE_TYPE environment variable
          echo "Setting DATABASE_TYPE environment variable..."
          vercel env add DATABASE_TYPE preview --token "$VERCEL_TOKEN" <<< "$DATABASE_TYPE" || true
          
          # Set DATABASE_URL environment variable
          echo "Setting DATABASE_URL environment variable..."
          vercel env add DATABASE_URL preview --token "$VERCEL_TOKEN" <<< "$DATABASE_URL" || true
          
          echo "Environment variables configured successfully"

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build project artifacts
        run: vercel build --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token "$VERCEL_TOKEN")
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URL
        if: success() && needs.check-ci-status.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ needs.check-ci-status.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment Ready!**\n\n🔗 **URL:** ${{ steps.deploy.outputs.url }}\n\n_Deployed from commit: ${context.sha.substring(0, 7)}_`
            })

  # Deploy production for main branch
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [check-ci-status, supabase-migrate]
    if: |
      always() &&
      needs.check-ci-status.outputs.is_pr == 'false' &&
      (needs.supabase-migrate.result == 'success' || needs.supabase-migrate.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_vercel) ||
        github.event_name == 'push'
      )

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        
      - name: Configure Vercel Environment Variables
        run: |
          # Set DATABASE_TYPE environment variable
          echo "Setting DATABASE_TYPE environment variable..."
          vercel env add DATABASE_TYPE preview --token "$VERCEL_TOKEN" <<< "$DATABASE_TYPE" || true
          
          # Set DATABASE_URL environment variable
          echo "Setting DATABASE_URL environment variable..."
          vercel env add DATABASE_URL preview --token "$VERCEL_TOKEN" <<< "$DATABASE_URL" || true
          
          echo "Environment variables configured successfully"

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build project artifacts
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Output deployment URL
        run: echo "Production deployed to ${{ steps.deploy.outputs.url }}"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Production URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  # Notify on deployment completion
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [check-ci-status, supabase-migrate, deploy-preview, deploy-production]
    if: always()

    steps:
      - name: Check deployment status
        run: |
          migrate_result="${{ needs.supabase-migrate.result }}"
          preview_result="${{ needs.deploy-preview.result }}"
          deploy_result="${{ needs.deploy-production.result }}"
          is_pr="${{ needs.check-ci-status.outputs.is_pr }}"

          echo "Migration: $migrate_result"
          echo "Preview Deploy: $preview_result"
          echo "Production Deploy: $deploy_result"
          echo "Is PR: $is_pr"

          if [ "$is_pr" == "true" ] && [ "$preview_result" == "success" ]; then
            echo "Preview deployment successful!"
          elif [ "$is_pr" == "false" ] && [ "$deploy_result" == "success" ]; then
            echo "Production deployment successful!"
          elif [ "$is_pr" == "false" ] && [ "$deploy_result" == "skipped" ] && [ "$migrate_result" == "success" ]; then
            echo "Migrations applied, Vercel deploy skipped"
          elif [ "$is_pr" == "false" ] && [ "$deploy_result" == "skipped" ] && [ "$migrate_result" == "skipped" ]; then
            echo "No deployment actions taken"
          else
            echo "Deployment failed or was skipped"
            echo "Migration result: $migrate_result"
            echo "Preview result: $preview_result"
            echo "Deploy result: $deploy_result"
            exit 1
          fi
