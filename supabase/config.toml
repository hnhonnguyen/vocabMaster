# Supabase Configuration for VocabMaster
# See: https://supabase.com/docs/guides/cli/config

[project]
id = "your-project-ref"
name = "vocabmaster"

[api]
# API URL will be: https://<project-ref>.supabase.co
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Database connection settings
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false

[experimental]
orioledb_version = ""

# Local development overrides
[local]
[local.db]
# Settings for local development database
[local.db.settings]
# Enable these settings only during local development

# Migration settings
[db.migrations]
# Directory containing migration files
dir = "supabase/migrations"

# Seed data settings
[db.seed]
enabled = true
sql_paths = ["supabase/seed.sql"]
